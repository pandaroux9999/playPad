// ── Sheet swipe-down gesture ──
function useSheetSwipe(onClose) {
  const panelRef = useRef(null);
  const overlayRef = useRef(null);
  const drag = useRef({ startY: 0, lastY: 0, active: false });
  const onTouchStart = useCallback(e => {
    e.stopPropagation();
    const el = panelRef.current;
    if (!el || el.scrollTop > 0) return;
    const t = e.touches[0];
    drag.current = { startY: t.clientY, lastY: t.clientY, active: true };
    el.style.transition = 'none';
  }, []);
  const onTouchMove = useCallback(e => {
    e.stopPropagation();
    const d = drag.current;
    if (!d.active) return;
    d.lastY = e.touches[0].clientY;
    const delta = d.lastY - d.startY;
    if (delta <= 0) return;
    const el = panelRef.current;
    if (el) el.style.transform = `translateY(${delta}px)`;
    const o = overlayRef.current;
    if (o) o.style.opacity = Math.max(0.3, 1 - delta / 400);
  }, []);
  const onTouchEnd = useCallback(e => {
    e.stopPropagation();
    const d = drag.current;
    if (!d.active) return;
    d.active = false;
    const delta = d.lastY - d.startY;
    const el = panelRef.current;
    if (!el) return;
    if (delta > 100) {
      el.style.transition = 'transform 0.25s ease-out';
      el.style.transform = 'translateY(100%)';
      setTimeout(onClose, 200);
    } else {
      el.style.transition = 'transform 0.3s cubic-bezier(0.32, 0.72, 0, 1)';
      el.style.transform = '';
      const o = overlayRef.current;
      if (o) o.style.opacity = '';
    }
  }, [onClose]);
  return { panelRef, overlayRef, onTouchStart, onTouchMove, onTouchEnd };
}

const API_BASE = window.location.protocol + '//' + window.location.hostname;
const API = {
  async request(method, url, body, options = {}) {
    const fetchUrl = url.startsWith('/') ? API_BASE + url : url;
    const opts = { method, headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' }, credentials: 'same-origin' };
    const timeoutMs = options?.timeoutMs || 0;
    const controller = timeoutMs > 0 ? new AbortController() : null;
    const timeoutId = controller ? setTimeout(() => controller.abort(), timeoutMs) : null;
    if (controller) opts.signal = controller.signal;
    if (body) opts.body = JSON.stringify(body);
    console.log(`[API] ${method} ${fetchUrl}`, body || '');
    try {
      const res = await fetch(fetchUrl, opts);
      console.log(`[API] Response ${res.status}`, res.statusText);
      let data = {};
      try {
        data = await res.json();
      } catch (_) {
        data = {};
      }
      console.log(`[API] Data`, data);
      if (!res.ok) throw new Error(data.error || 'Erreur serveur');
      return data;
    } catch (err) {
      if (err?.name === 'AbortError') throw new Error('Le serveur met trop de temps à répondre. Réessaie dans quelques secondes.');
      throw err;
    } finally {
      if (timeoutId) clearTimeout(timeoutId);
    }
  },

function getGamePlatforms(game) {

function PurchasePanel({ game, offers, onClose }) {
  const [sort, setSort] = useState('price-asc');
  const [loading, setLoading] = useState(false);

  const sorted = useMemo(() => {
    const list = [...(offers || [])];
    switch (sort) {
      case 'price-asc': return list.sort((a, b) => (a.price ?? Infinity) - (b.price ?? Infinity));
      case 'price-desc': return list.sort((a, b) => (b.price ?? 0) - (a.price ?? 0));
      case 'name': return list.sort((a, b) => a.store.name.localeCompare(b.store.name));

      default: return list;
    }
  }, [offers, sort]);

  return h('div', { className: "fixed inset-0 z-50 flex items-center justify-center p-4" },
    h('div', { className: "absolute inset-0 bg-black/60 backdrop-blur-sm", onClick: onClose }),
    h('div', { className: "relative bg-card border border-border rounded-2xl w-full max-w-lg max-h-[90vh] sm:max-h-[80vh] overflow-y-auto", style: { zIndex: 1 } },
      // En-tête
      h('div', { className: "flex items-center justify-between p-3 border-b border-border sticky top-0 bg-card z-10" },
        h('div', { className: "flex items-center gap-2 min-w-0" },
          h(ShoppingCart, { size: 14, style: { color: "#22c55e" } }),
          h('span', { className: "text-xs font-bold truncate" }, game.title || '')
        ),
        h('button', { onClick: onClose, className: "p-1 rounded-lg hover:opacity-80 flex-shrink-0", style: { color: "#8888aa" } }, h(X, { size: 14 }))

      // Tri
      h('div', { className: "flex items-center gap-1.5 px-3 py-2 border-b border-border" },
        h('span', { className: "text-[9px] text-muted-foreground font-medium" }, "Trier :"),
        ['price-asc', 'price-desc', 'name'].map(key => {

        })
      ),

      h('div', { className: "p-3 space-y-1.5" },
        sorted.length === 0 && h('p', { className: "text-[10px] text-muted-foreground text-center py-4" }, "Aucune boutique trouvée"),
        sorted.map((offer, i) => h('a', {

          ),

            h('div', { className: "flex items-center gap-1" },

const AFFILIATE_CONFIG = {
  steam: { referral: "" },
  epic: { affiliate: "" },
  humble: { partner: "" },
  isthereanydeal: {},
};

function getSteamAppId(game) {
  const m = (game.cover || "").match(/\/apps\/(\d+)\//);
  return m ? m[1] : null;
}

function getStoreLinks(game) {
  const links = [];
  const appId = getSteamAppId(game);
  const title = encodeURIComponent(game.title);
  if (appId) {
    const ref = AFFILIATE_CONFIG.steam.referral;
    links.push({ store: "Steam", url: `https://store.steampowered.com/app/${appId}${ref ? '?ref=' + ref : ''}`, color: "#1b2838", textColor: "#c7d5e0", icon: "steam" });
  }
  const epicAff = AFFILIATE_CONFIG.epic.affiliate;
  links.push({ store: "Epic Games", url: `https://store.epicgames.com/en-US/p/${title}${epicAff ? '?affiliate=' + epicAff : ''}`, color: "#2a2a2a", textColor: "#ffffff", icon: "epic" });

function ChatBot({ setView }) {
  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const listRef = useRef(null);
  useEffect(() => { if (listRef.current) listRef.current.scrollTop = listRef.current.scrollHeight; }, [messages]);
  const send = async () => {
    if (!input.trim()) return;
    const userMsg = input.trim();
    setInput("");
    setMessages(p => [...p, { role: "user", content: userMsg }]);
    setLoading(true);
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
        body: JSON.stringify({ message: userMsg, history: messages.slice(-10) }),
      });
      const data = await res.json();
      setMessages(p => [...p, { role: "assistant", content: data.text, actions: data.actions }]);
    } catch {
      setMessages(p => [...p, { role: "assistant", content: "Désolé, je n'ai pas pu répondre." }]);
    }
    setLoading(false);
  };
  const doAction = (a) => {
    if (a.type === "view") { setView(a.value); setOpen(false); }
    if (a.type === "url") window.open(a.value, "_blank");
  };
  return h('div', { className: "fixed z-50", style: { bottom: "92px", right: "16px" } },
    open && h('div', { className: "absolute bottom-16 right-0 w-80 h-96 bg-card border border-border rounded-2xl flex flex-col shadow-2xl overflow-hidden", style: { boxShadow: "0 20px 60px rgba(0,0,0,0.5)" } },
      h('div', { className: "flex items-center justify-between px-4 py-3 border-b border-border", style: { background: GRAD } },
        h('span', { className: "text-sm font-bold text-white", style: { fontFamily: "'Rajdhani', sans-serif" } }, "Assistant"),
        h('button', { onClick: () => setOpen(false), className: "text-white/70 hover:text-white" }, h(X, { size: 16 }))
      ),
      h('div', { ref: listRef, className: "flex-1 overflow-y-auto p-3 space-y-2" },
        messages.length === 0 && h('p', { className: "text-[11px] text-muted-foreground text-center mt-8" }, "Pose une question sur l'application !"),
        messages.map((msg, i) => h('div', { key: i, className: msg.role === "user" ? "text-right" : "text-left" },
          h('div', { className: "inline-block max-w-[85%] px-3 py-2 rounded-xl text-xs leading-relaxed", style: msg.role === "user" ? { background: GRAD, color: "#fff" } : { background: "rgba(255,255,255,0.06)", color: "#e8e8f0", border: "1px solid rgba(255,255,255,0.06)" } },
            msg.content,
            msg.actions && msg.actions.map((a, j) => h('button', { key: j, onClick: () => doAction(a), className: "block mt-1.5 text-[10px] font-bold px-2.5 py-1.5 rounded-lg hover:opacity-80 transition-opacity", style: { background: `${P1}30`, color: P1 } }, a.label))
          )
        )),
        loading && h('div', { className: "text-left" },
          h('div', { className: "inline-block px-3 py-2 rounded-xl text-xs", style: { background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.06)" } }, h(Loader, { size: 14, className: "animate-spin" }))
        )
      ),
      h('div', { className: "border-t border-border p-2 flex gap-2" },
        h('input', { value: input, onChange: e => setInput(e.target.value), onKeyDown: e => e.key === "Enter" && send(), placeholder: "Ta question...", className: "flex-1 bg-secondary/60 border border-border rounded-xl px-3 py-2 text-xs text-foreground placeholder-muted-foreground outline-none focus:border-purple-500 transition-colors" }),
        h('button', { onClick: send, disabled: loading || !input.trim(), className: "p-2 rounded-xl text-white disabled:opacity-40", style: { background: GRAD } }, h(Send, { size: 14 }))
      )
    ),
    h('button', { onClick: () => setOpen(!open), className: "w-12 h-12 rounded-full flex items-center justify-center shadow-lg hover:scale-105 transition-transform", style: { background: GRAD, boxShadow: "0 8px 24px rgba(139,92,246,0.4)" } },
      h(MessageCircle, { size: 22, className: "text-white" })
    )
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState("catalogue");
  const swipeStartX = useRef(null);
  const swipeIndicator = useRef(null);
  const TAB_ORDER = ["catalogue", "actus", "community", "profil"];
  const onTouchStart = (e) => {
    swipeStartX.current = e.touches[0].clientX;
  };
  const onTouchMove = (e) => {
    if (swipeStartX.current === null) return;
    const dx = e.touches[0].clientX - swipeStartX.current;
    if (Math.abs(dx) < 20) return;
    // don't swipe if target is in a horizontally scrollable area
    let el = e.target;
    while (el && el !== e.currentTarget) {
      const style = window.getComputedStyle(el);
      const ox = style.overflowX;
      if (ox === 'auto' || ox === 'scroll' || ox === 'hidden') return;
      const o = style.overflow;
      if (o === 'auto' || o === 'scroll' || o === 'hidden') return;
      el = el.parentElement;
    }
    e.preventDefault();
  };
  const onTouchEnd = (e) => {
    if (swipeStartX.current === null) return;
    const dx = e.changedTouches[0].clientX - swipeStartX.current;
    swipeStartX.current = null;
    if (Math.abs(dx) < 120) return;
    const idx = TAB_ORDER.indexOf(view);
    if (idx === -1) return;
    if (dx < 0 && idx < TAB_ORDER.length - 1) setView(TAB_ORDER[idx + 1]);
    if (dx > 0 && idx > 0) setView(TAB_ORDER[idx - 1]);
  };
  const [games, setGames] = useState([]);
  const [wishlistIds, setWishlistIds] = useState(new Set());
  const [topThreeIds, setTopThreeIds] = useState(new Set());

          if (!notifiedApiIds.current.has(n.id)) {
            notifiedApiIds.current.add(n.id);
            setNotifications(prev => [{ id: 'api-' + n.id, text: n.body || n.title, read: n.read, type: n.type, timestamp: new Date(n.created_at).getTime(), senderName: n.title }, ...prev]);
          }
        }
      }).catch(() => {});
    };
    poll();
    const interval = setInterval(poll, 15000);
    return () => clearInterval(interval);
  }, [user]);

  // Sync unread badge with API count
  useEffect(() => {
    if (!user) return;
    const poll = () => {
      API.getUnreadNotifCount().then(d => {
        const apiUnread = d.count || 0;
        setNotifications(prev => {
          const localUnread = prev.filter(n => !n.read).length;
          if (apiUnread > localUnread) return prev;
          return prev;
        });
      }).catch(() => {});
    };
    const interval = setInterval(poll, 20000);
    return () => clearInterval(interval);
  }, [user]);

  // Fetch discovery notifications with a delay after login
  useEffect(() => {
    if (!user) { setDiscoveries([]); return; }
    discoveryTimerRef.current = setTimeout(() => {
      API.getDiscoveries().then(d => {
        setDiscoveries(d.discoveries || []);
      }).catch(() => {});
    }, 3000);
    return () => { if (discoveryTimerRef.current) clearTimeout(discoveryTimerRef.current); };
  }, [user]);

  const loadData = async () => {
    const [gData, wData, tData, rData] = await Promise.all([API.getGames(), API.getWishlist(), API.getTopThree(), API.getGameRatings()]);
    setGames(gData.games.map(n));
    setWishlistIds(new Set(wData.wishlist));
    const t = (tData.topThree || []).map(n);
    setTopThree(t);
    setTopThreeIds(new Set(t.map(g => g.game_id)));
    setRatings(rData.ratings || {});
    refreshBooster();
  };

  const handleAddToLibrary = async (game) => {
    if (!user) { setAuthModal('register'); return; }
    const existing = games.find(g => g.game_id === game.game_id);
    if (existing) { setSelectedGame(existing); return; }
    const newGame = { ...game, user_rating: 0, review_text: "", review_public: 1, has_review: 0, status: "not_started", playtime: 0 };
    try {
      await API.syncGames([newGame]);
      await loadData();
      showToast(`"${game.title}" ajout\u00e9 \u00e0 ta biblioth\u00e8que`);
    } catch (e) {
      console.error('[Library] Add game error:', e.message);
      showToast("Erreur lors de l'ajout: " + e.message);
    }
  };

  const handleToggleWishlist = async (game) => {
    if (!user) { setAuthModal('register'); return; }
    const gameId = game.game_id || game.id;
    try {
      const data = await API.toggleWishlist(gameId);
      setWishlistIds(prev => {
        const next = new Set(prev);
        if (data.added) next.add(gameId); else next.delete(gameId);
        return next;
      });
      showToast(data.added ? `Ajout\u00e9 aux souhaits` : `Retir\u00e9 des souhaits`);
    } catch (e) {}
  };

  const handleToggleTopThree = async (game) => {
    if (!user) { setAuthModal('register'); return; }
    const id = game.game_id || game.id;
    const already = topThreeIds?.has(id);
    try {
      if (already) {
        await API.setTopThree(id, null);
        setTopThreeIds(prev => { const n = new Set(prev); n.delete(id); return n; });
        setTopThree(prev => prev.filter(g => (g.game_id || g.id) !== id));
        showToast(`Retir\u00e9 du Top 3`);
      } else if ((topThreeIds?.size || 0) < 3) {
        const pos = (topThreeIds?.size || 0) + 1;
        await API.setTopThree(id, pos);
        setTopThreeIds(prev => { const n = new Set(prev); n.add(id); return n; });
        showToast(`Ajout\u00e9 au Top 3 (position ${pos})`);
      } else {
        showToast(`Top 3 d\u00e9j\u00e0 complet !`);
      }
    } catch (err) {
      console.error('[TopThree] Error:', err.message);
      showToast('Erreur Top 3: ' + err.message);
      await loadData();
    }
  };

  const handleBoostGame = async (gameId) => {
    if (!user) { setAuthModal('register'); return; }
    try {
      console.log('[Booster] Boost Game:', gameId);
      await API.boosterGame(gameId);
      console.log('[Booster] Success, decrementing points');
      setBoosterPoints(prev => Math.max(0, prev - 1));
      setUserBoostedSet(prev => new Set(prev).add(gameId));
      refreshBooster();
      setCatalogRefreshKey(k => k + 1);
      showToast("Jeu boost\u00e9 !");
    } catch (e) {
      console.error('[Booster] Error:', e.message);
      showToast("Erreur: " + (e.message || ""));
    }
  };

  const handleDeleteGame = async (gameId) => {
    if (!confirm("Supprimer ce jeu de votre biblioth\u00e8que ?")) return;
    await API.deleteGame(gameId);
    await loadData();
    setSelectedGame(null);
    showToast("Jeu retir\u00e9 de la biblioth\u00e8que");
  };

  const handleStatusChange = async () => {
    try {
      const d = await API.getGames();
      const refreshed = (d.games || []).map(n);
      setGames(refreshed);
      setSelectedGame(prev => {
        if (!prev) return prev;
        const match = refreshed.find(g => g.game_id === (prev.game_id || prev.id));
        return match ? { ...prev, _inLibrary: true, status: match.status, userRating: match.userRating } : prev;
      });
    } catch {}
  };

  const handleSaveReview = async (gameId, rating, reviewText, reviewPublic, gameTitle, gameCover) => {
    if (!user) { setAuthModal('register'); return; }
    console.log('[handleSaveReview] Calling API.saveReview with:', { gameId, rating, reviewText, reviewPublic, gameTitle, gameCover });
    const saveResult = await API.saveReview(gameId, rating, reviewText, reviewPublic, gameTitle, gameCover);
    console.log('[handleSaveReview] API.saveReview response:', saveResult);
    setFreshReview({
      id: Date.now(), user_id: userId, game_id: gameId, game_title: gameTitle, game_cover: gameCover || '',
      rating, review_text: reviewText, created_at: new Date().toISOString(),
      users: { display_name: user?.display_name, username: user?.username, avatar_url: user?.avatar_url },
      thumbs_up: 0, thumbs_down: 0, my_vote: 0, reply_count: 0,
    });
    setCommunityRefreshKey(k => k + 1);
    showToast("Critique sauvegard\u00e9e !");
    try {
      const [g2] = await Promise.all([API.getGames()]);
      console.log('[handleSaveReview] Post-save getGames success, got', g2.games.length, 'games');
      const next = g2.games.map(n);
      setGames(next);
    } catch (e) { console.error('[handleSaveReview] Post-save refresh failed', e); }
  };

  const handleLoginSuccess = (userData) => {
    setUser(userData);
    setShowHero(true);
    API.getGames().then(d => {
      setGames((d.games || []).map(n));
      if ((d.games || []).length === 0 && !localStorage.getItem('playpad_onboarding_done')) { setShowOnboarding(true); localStorage.setItem('playpad_onboarding_done', '1'); }
    }).catch(() => {});
    API.getWishlist().then(d => setWishlistIds(new Set(d.wishlist))).catch(() => {});
    API.getTopThree().then(d => {
      const t = (d.topThree || []).map(n);
      setTopThree(t);
      setTopThreeIds(new Set(t.map(g => g.game_id)));
    }).catch(() => {});
    API.getGameRatings().then(d => setRatings(d.ratings || {})).catch(() => {});
    API.getFriends().then(d => setFriendsCount((d.friends || []).length)).catch(() => {});
    refreshBooster();
    setTimeout(() => {
      API.getDiscoveries().then(d => setDiscoveries(d.discoveries || [])).catch(() => {});
    }, 3000);
  };

  const handleLogout = async () => {
    await API.logout();
    setUser(null);
    setGames([]);
    setWishlistIds(new Set());
    setTopThree([]);
    setTopThreeIds(new Set());
    setView("profil");
  };

  const markAsRead = (id, friendId) => {
    setNotifications(prev => prev.map(n => n.id === id ? { ...n, read: true } : n));
    if (friendId) {
      const friend = FRIENDS.find(f => f.id === friendId);
      if (friend) { setSelectedFriend(friend); setView("community"); }
    }
  };

  const handleDeleteAccount = async () => {
    if (!confirm("Supprimer d\u00e9finitivement ton compte et toutes tes donn\u00e9es ?")) return;
    await API.deleteAccount();
    handleLogout();
  };

  const handleUpdateAvatar = async (avatarUrl) => {
    await API.updateAvatar(avatarUrl);
    setUser(prev => ({ ...prev, avatar_url: avatarUrl }));
  };

  const handleUpdateEmail = async (email) => {
    const data = await API.updateEmail(email);
    if (data.error) { showToast(data.error); return; }
    setUser(prev => ({ ...prev, email: data.email || email }));
    showToast('Email mis à jour');
  };

  const handleDiscover = (section) => {
    setDiscoveries(prev => prev.filter(d => d.id !== section));
    API.dismissDiscovery(section).catch(() => {});
    const sectionViews = { esport: 'actus', reviews: 'community', community: 'community', top3: 'profil', boost: 'catalogue' };
    setView(sectionViews[section] || 'catalogue');
  };

  const handleDismissDiscovery = (section) => {
    setDiscoveries(prev => prev.filter(d => d.id !== section));
    API.dismissDiscovery(section).catch(() => {});
  };

  if (loading) {
    return h('div', { className: "min-h-screen flex items-center justify-center", style: { background: "#030308" } },
      h('div', { className: "flex flex-col items-center gap-3" },
        h(Loader, { size: 28, className: "animate-spin", style: { color: P1 } }),
        h('p', { className: "text-xs text-muted-foreground" }, "Chargement\u2026")
      )
    );
  }

  if (!user && !guestMode) return h(LandingPage, { onLoginSuccess: handleLoginSuccess, resetToken, onResetComplete: () => setResetToken(null), onEnterAsGuest: () => setGuestMode(true) });

  const showAuthModal = (mode) => setAuthModal(mode);
  const closeAuthModal = () => setAuthModal(null);

  return h('div', { className: "min-h-screen", style: { background: "#030308" } },
    h('div', { className: "fixed inset-0 pointer-events-none overflow-hidden" },
      h('div', { className: "absolute top-1/3 left-1/2 -translate-x-1/2 w-96 h-96 rounded-full blur-3xl", style: { background: `${P1}07` } }),
      h('div', { className: "absolute bottom-1/4 right-1/3 w-64 h-64 rounded-full blur-3xl", style: { background: `${P2}07` } })
    ),
    h('div', { onTouchStart, onTouchMove, onTouchEnd, className: "app-content relative flex flex-col h-screen bg-background mx-auto" },
      h('div', { className: "flex-1 overflow-hidden" },
        h('div', { className: "h-full overflow-y-auto" },
          null,
          view === "catalogue" && h(CatalogueView, { key: 'cat', refreshKey: catalogRefreshKey, onSelect: game => { const e = games.find(g => g.game_id === game.game_id) || games.find(g => g.title === game.title); const sg = e || { ...game, userRating: 0, hasReview: false, reviewText: "", reviewPublic: true, status: "not_started" }; sg._inLibrary = Boolean(e); setSelectedGame(sg); }, wishlistIds, onToggleWishlist: handleToggleWishlist, ratings, topThreeIds, onToggleTopThree: handleToggleTopThree, showToast, boosterPoints, onBoostGame: handleBoostGame, boostedGames, userBoostedSet }),
          view === "actus" && h(MagView, { onSelectGame: setSelectedGame, showAuthModal, user }),
          view === "community" && h(CommunityView, { key: 'comm', refreshKey: communityRefreshKey, freshReview, onFreshReviewConsumed: () => setFreshReview(null), onSelectFriend: setSelectedFriend, onSelectGame: setSelectedGame, onAddNotification: (msg, type) => { setNotifications(prev => [ { id: "n" + Date.now(), text: msg, read: false, type: type || 'friend', timestamp: Date.now() }, ...prev ]); }, showAuthModal, user, onChatFriend: (f) => { setChatFriend(f); setSelectedFriend(f); } }),
          view === "profil" && h(ProfilView, { user, games, wishlistIds, ratings, onToggleWishlist: handleToggleWishlist, onSelect: game => setSelectedGame({ ...game, _inLibrary: true }), search, setSearch, activePlatform, setActivePlatform, notifications, onMarkAsRead: markAsRead, topThreeIds, topThree, onToggleTopThree: handleToggleTopThree, onLogout: handleLogout, onDeleteAccount: handleDeleteAccount, onUpdateAvatar: handleUpdateAvatar, onUpdateEmail: handleUpdateEmail, onSyncComplete: () => { loadData(); setCatalogRefreshKey(k => k + 1); }, showToast, showAuthModal, setView, onAddNotification: (msg, type) => { setNotifications(prev => [ { id: "n" + Date.now(), text: msg, read: false, type: type || 'sync', timestamp: Date.now() }, ...prev ]); } })
        )
      ),
      h(BottomNav, { view, setView }),
      h(DiscoveryToast, { discoveries, onDiscover: handleDiscover, onDismiss: handleDismissDiscovery }),
      showOnboarding && h(OnboardingModal, { onDismiss: () => setShowOnboarding(false), user, gamesCount: games.length, friendsCount }),
      selectedGame && h(GameDetailSheet, {
        key: selectedGame.game_id || selectedGame.id,
        game: selectedGame,
        onClose: () => setSelectedGame(null),
        onSaveReview: handleSaveReview,
        onDeleteGame: handleDeleteGame,
        onStatusChange: handleStatusChange,
        wishlistIds,
        onToggleWishlist: handleToggleWishlist,
        topThreeIds,
        onToggleTopThree: handleToggleTopThree,
        userId: user?.id,
        ratings,
        boosterPoints,
        userBoostedSet,
        onBoostGame: handleBoostGame,
        showAuthModal,
      }),
      selectedFriend && h(FriendProfileSheet, { key: selectedFriend.id + (chatFriend?.id === selectedFriend.id ? '-chat' : ''), friend: selectedFriend, onClose: () => { setSelectedFriend(null); setChatFriend(null); }, isOnline, startChat: chatFriend?.id === selectedFriend.id, onAddNotification: (msg, type) => { setNotifications(prev => [ { id: "n" + Date.now(), text: msg, read: false, friendId: selectedFriend.id, type: type || 'friend', timestamp: Date.now() }, ...prev ]); }, onSelectGame: setSelectedGame }),
      authModal && h('div', { className: "fixed inset-0 z-50 flex items-end md:items-center justify-center", style: { animation: "fadeIn 0.2s ease-out" } },
        h('div', { className: "absolute inset-0", style: { background: "rgba(0,0,0,0.7)" }, onClick: closeAuthModal }),
        h('div', { className: "relative max-h-[90vh] overflow-y-auto", style: { animation: "slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1)" } },
          h(AuthPage, { onLoginSuccess: (data) => { closeAuthModal(); handleLoginSuccess(data); }, resetToken, onResetComplete: () => setResetToken(null), initialMode: authModal === 'register', onBack: closeAuthModal })
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
