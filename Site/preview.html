    * { scrollbar-width: none; }
    body { margin: 0; background: #030308; }

    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }

    /* ── Animations ─────────────────────────────────────────── */
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
    .view-enter { animation: fadeSlideIn 0.2s ease-out; }

    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .sheet-overlay { animation: fadeIn 0.2s ease-out; }
    .sheet-panel { animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1); }

    .game-card { transition: transform 0.15s ease, box-shadow 0.15s ease; cursor: pointer; }
    .game-card:hover { transform: scale(1.02); box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
    .game-card:active { transform: scale(0.94); }

    .nav-btn { transition: color 0.2s ease; }
    .nav-btn:hover { opacity: 0.8; }

    .pill-btn { transition: all 0.2s ease; }
    .pill-btn:hover { opacity: 0.85; }

    .review-card { transition: border-color 0.2s ease, transform 0.15s ease; cursor: pointer; }
    .review-card:hover { border-color: #8B5CF6 !important; transform: scale(1.01); }
    .review-card:active { transform: scale(0.98); }

    .sync-btn { transition: opacity 0.2s ease; }
    .sync-btn:hover { opacity: 0.8 !important; }

    .sheet-close-btn { transition: background 0.2s ease; }
    .sheet-close-btn:hover { background: rgba(0,0,0,0.7) !important; }
  </style>
</head>

  const toggleWishlist = (game) => {
    setWishlist(prev => prev.some(g => g.id === game.id) ? prev.filter(g => g.id !== game.id) : [...prev, game]);
  };
  const handleSaveReview = (id, rating, review, isPublic) => {
    const update = (g) => g.id === id ? { ...g, userRating: rating, reviewText: review, reviewPublic: isPublic, hasReview: review.trim().length > 0 } : g;
    setGames(prev => prev.map(update));
    setSelectedGame(prev => prev ? update(prev) : null);
  };

    setNotifications(prev => prev.map(n => n.id === id ? { ...n, read: true } : n));
    if (friendId) {

      if (friend) { setSelectedFriend(friend); setView("community"); }

    setTopThree(prev => {
      if (prev.some(g => g.id === game.id)) return prev.filter(g => g.id !== game.id);
