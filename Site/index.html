const API = {
  async request(method, url, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin' };
    if (body) opts.body = JSON.stringify(body);
    console.log(`[API] ${method} ${url}`, body || '');
    const res = await fetch(url, opts);
    console.log(`[API] Response ${res.status}`, res.statusText);
    const data = await res.json();
    console.log(`[API] Data`, data);
    if (!res.ok) throw new Error(data.error || 'Erreur serveur');
    return data;
  },
  register: (u, d, p) => API.request('POST', '/api/register', { username: u, displayName: d, password: p }),
  login: (u, p) => API.request('POST', '/api/login', { username: u, password: p }),
  logout: () => API.request('POST', '/api/logout'),
  me: () => API.request('GET', '/api/me'),
  getGames: () => API.request('GET', '/api/games'),
  syncGames: (games) => API.request('POST', '/api/games/sync', { games }),
  setStatus: (gameId, status) => API.request('POST', '/api/games/status', { gameId, status }),
  saveReview: (gameId, rating, reviewText, reviewPublic) => API.request('POST', '/api/games/review', { gameId, rating, reviewText, reviewPublic }),
  getWishlist: () => API.request('GET', '/api/wishlist'),
  toggleWishlist: (gameId) => API.request('POST', '/api/wishlist/toggle', { gameId }),
  getTopThree: () => API.request('GET', '/api/topthree'),
  setTopThree: (gameId, position) => API.request('POST', '/api/topthree', { gameId, position }),
  getGameReviews: (gameId) => API.request('GET', `/api/games/reviews?gameId=${gameId}`),
  getGameRatings: () => API.request('GET', '/api/games/ratings'),
  deleteAccount: () => API.request('DELETE', '/api/account'),
};

function PlatformLogo({ platform, size = 24 }) {
  const map = {
    ps5: "icons8-playstation-32.png",
    steam: "icons8-steam-48.png",
    epic: "icons8-epic-games-48.png",
    nintendo: "icons8-nintendo-switch-48.png",
    xbox: "icons8-xbox-48.png",
  };
  const file = map[platform];
  return file ? h('img', { src: file, alt: platform, width: size, height: size, style: { objectFit: "contain", display: "inline-block" } }) : null;
}

function PlatformBadge({ platform }) {
  const cfg = PLATFORM_CONFIG[platform];
  return h('span', { className: "inline-flex items-center gap-1 text-[9px] font-black px-1.5 py-0.5 rounded font-mono tracking-widest uppercase leading-none", style: { background: cfg.color + "cc", color: cfg.text, border: `1px solid ${cfg.color}` } }, h(PlatformLogo, { platform, size: 10 }), cfg.label);
}

function StarRating({ rating, size = 14, interactive = false, onChange }) {
  return h('div', { className: "flex gap-0.5" }, ...[1,2,3,4,5].map(i =>
    h('button', { key: i, onClick: () => interactive && onChange?.(i), className: interactive ? "cursor-pointer hover:scale-125 transition-transform" : "cursor-default pointer-events-none" },
      h(Star, { size, fill: i <= rating ? "#f59e0b" : "transparent", stroke: i <= rating ? "#f59e0b" : "#3a3a55", strokeWidth: 1.5 })
    )
  ));
}

function GameCard({ game, onClick, wishlistIds, onWishlist, topThreeIds, onCrown }) {
  const status = game.status ? STATUS_CONFIG[game.status] : null;
  const inWishlist = wishlistIds?.has(game.game_id || game.id);
  const inTopThree = topThreeIds?.has(game.game_id || game.id);
  const gameId = game.game_id || game.id;
  return h('div', { onClick, className: "game-card relative rounded-2xl overflow-hidden", style: { aspectRatio: "3/4", background: "#1a1a2e" } },
    h('img', { src: game.cover, alt: game.title, className: "absolute inset-0 w-full h-full object-cover", loading: "lazy" }),
    h('div', { className: "absolute inset-0 bg-gradient-to-t from-black/95 via-black/20 to-transparent" }),

      h('div', { className: "mt-1.5" }, h(StarRating, { rating: game.userRating, size: 9 }))

      h('form', { onSubmit: handleSubmit, className: "w-full space-y-3" },
        h('div', null,
          h('p', { className: "text-[10px] font-bold text-muted-foreground mb-1.5 uppercase tracking-wider" }, "Identifiant"),
          h('input', { value: username, onChange: e => setUsername(e.target.value), placeholder: "Choisis un identifiant", className: "w-full bg-secondary/60 border border-border rounded-xl px-3.5 py-3 text-xs text-foreground placeholder-muted-foreground outline-none focus:border-purple-500 transition-colors" })
        ),
        isRegister && h('div', null,
          h('p', { className: "text-[10px] font-bold text-muted-foreground mb-1.5 uppercase tracking-wider" }, "Nom d'affichage"),
          h('input', { value: displayName, onChange: e => setDisplayName(e.target.value), placeholder: "Ton pseudo public", className: "w-full bg-secondary/60 border border-border rounded-xl px-3.5 py-3 text-xs text-foreground placeholder-muted-foreground outline-none focus:border-purple-500 transition-colors" })
        ),
        h('div', null,
          h('p', { className: "text-[10px] font-bold text-muted-foreground mb-1.5 uppercase tracking-wider" }, "Mot de passe"),
          h('input', { type: "password", value: password, onChange: e => setPassword(e.target.value), placeholder: isRegister ? "Min. 4 caract\u00e8res" : "Entrez votre mot de passe", className: "w-full bg-secondary/60 border border-border rounded-xl px-3.5 py-3 text-xs text-foreground placeholder-muted-foreground outline-none focus:border-purple-500 transition-colors" })
        ),
        error && h('p', { className: "text-[11px] text-red-400 font-medium text-center" }, error),
        h('button', { type: "submit", disabled: loading, className: "w-full py-3 text-white text-sm font-bold rounded-xl flex items-center justify-center gap-2 hover:opacity-90 transition-opacity disabled:opacity-50", style: { background: GRAD, boxShadow: "0 8px 24px rgba(139,92,246,0.35)" } },
          loading && h(Loader, { size: 14, className: "animate-spin" }),
          isRegister ? "Cr\u00e9er mon compte" : "Se connecter"
        )
      ),
      h('button', { onClick: () => { setIsRegister(!isRegister); setError(""); }, className: "text-[11px] font-medium mt-5 hover:opacity-80 transition-opacity", style: { color: `${P1}cc` } },
        isRegister ? "D\u00e9j\u00e0 un compte ? Connecte-toi" : "Pas de compte ? Inscris-toi"
      ),
      h('p', { className: "text-[10px] text-muted-foreground/50 mt-4" }, "PlayPad \u00a9 2026"),
      toast && h('div', { className: "toast", style: { background: GRAD } }, toast)
    )
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState("library");
  const [games, setGames] = useState([]);
  const [wishlistIds, setWishlistIds] = useState(new Set());
  const [topThreeIds, setTopThreeIds] = useState(new Set());
  const [topThree, setTopThree] = useState([]);
  const [selectedGame, setSelectedGame] = useState(null);
  const [search, setSearch] = useState("");
  const [activePlatform, setActivePlatform] = useState("all");
  const [ratings, setRatings] = useState({});
  const [selectedFriend, setSelectedFriend] = useState(null);
  const [notifications, setNotifications] = useState(NOTIFICATIONS);
  const [toast, setToast] = useState(null);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

  useEffect(() => {
    console.log('[App] Checking session...');
    API.me().then(data => {
      console.log('[App] Session found:', data.user);
      setUser(data.user);
      return Promise.all([API.getGames(), API.getWishlist(), API.getTopThree(), API.getGameRatings()]);
    }).then(([gData, wData, tData, rData]) => {
      console.log('[App] Data loaded:', gData.games.length, 'games,', wData.wishlist.length, 'wishlist');
      setGames(gData.games.map(n));
      setWishlistIds(new Set(wData.wishlist));
      const t = (tData.topThree || []).map(n);
      setTopThree(t);
      setTopThreeIds(new Set(t.map(g => g.game_id)));
      setRatings(rData.ratings || {});
    }).catch((err) => {
      console.log('[App] No session (expected if not logged in):', err?.message);
    }).finally(() => setLoading(false));
  }, []);

  const loadData = async () => {
    const [gData, wData, tData, rData] = await Promise.all([API.getGames(), API.getWishlist(), API.getTopThree(), API.getGameRatings()]);
    setGames(gData.games.map(n));
    setWishlistIds(new Set(wData.wishlist));
    const t = (tData.topThree || []).map(n);
    setTopThree(t);
    setTopThreeIds(new Set(t.map(g => g.game_id)));
    setRatings(rData.ratings || {});
  };

  const handleAddToLibrary = async (game) => {
    const existing = games.find(g => g.game_id === game.game_id);
    if (existing) { setSelectedGame(existing); return; }
    const newGame = { ...game, user_rating: 0, review_text: "", review_public: 1, has_review: 0, status: "not_started", playtime: 0 };
    try {
      await API.syncGames([newGame]);
      await loadData();
      showToast(`"${game.title}" ajout\u00e9 \u00e0 ta biblioth\u00e8que`);
    } catch (e) {
      console.error('[Library] Add game error:', e.message);
      showToast("Erreur lors de l'ajout: " + e.message);
    }
  };

  const handleToggleWishlist = async (game) => {
    const gameId = game.game_id || game.id;
    try {
      const data = await API.toggleWishlist(gameId);
      setWishlistIds(prev => {
        const next = new Set(prev);
        if (data.added) next.add(gameId); else next.delete(gameId);
        return next;
      });
      showToast(data.added ? `Ajout\u00e9 aux souhaits` : `Retir\u00e9 des souhaits`);
    } catch (e) {}
  };

  const handleToggleTopThree = async (game) => {
    await loadData();
  };

  const handleSaveReview = async (gameId, rating, reviewText, reviewPublic) => {
    await API.saveReview(gameId, rating, reviewText, reviewPublic);
    await loadData();
    showToast("Critique sauvegard\u00e9e !");
  };

  const handleLoginSuccess = (userData) => {
    setUser(userData);
    API.getGames().then(d => setGames((d.games || []).map(n))).catch(() => {});
    API.getWishlist().then(d => setWishlistIds(new Set(d.wishlist))).catch(() => {});
    API.getTopThree().then(d => {
      const t = (d.topThree || []).map(n);
      setTopThree(t);
      setTopThreeIds(new Set(t.map(g => g.game_id)));
    }).catch(() => {});
    API.getGameRatings().then(d => setRatings(d.ratings || {})).catch(() => {});
  };

  const handleLogout = async () => {
    await API.logout();
    setUser(null);
    setGames([]);
    setWishlistIds(new Set());
    setTopThree([]);
    setTopThreeIds(new Set());
    setView("library");
  };

  const markAsRead = (id, friendId) => {
    setNotifications(prev => prev.map(n => n.id === id ? { ...n, read: true } : n));
    if (friendId) {
      const friend = FRIENDS.find(f => f.id === friendId);
      if (friend) { setSelectedFriend(friend); setView("community"); }
    }
  };

  const handleDeleteAccount = async () => {
    if (!confirm("Supprimer d\u00e9finitivement ton compte et toutes tes donn\u00e9es ?")) return;
    await API.deleteAccount();
    handleLogout();
  };

  if (loading) {
    return h('div', { className: "min-h-screen flex items-center justify-center", style: { background: "#030308" } },
      h('div', { className: "flex flex-col items-center gap-3" },
        h(Loader, { size: 28, className: "animate-spin", style: { color: P1 } }),
        h('p', { className: "text-xs text-muted-foreground" }, "Chargement\u2026")
      )
    );
  }

  if (!user) return h(AuthPage, { onLoginSuccess: handleLoginSuccess });

  return h('div', { className: "min-h-screen", style: { background: "#030308" } },
    h('div', { className: "fixed inset-0 pointer-events-none overflow-hidden" },
      h('div', { className: "absolute top-1/3 left-1/2 -translate-x-1/2 w-96 h-96 rounded-full blur-3xl", style: { background: `${P1}07` } }),
      h('div', { className: "absolute bottom-1/4 right-1/3 w-64 h-64 rounded-full blur-3xl", style: { background: `${P2}07` } })
    ),
    h('div', { className: "app-content relative flex flex-col h-screen bg-background mx-auto" },
      h('div', { className: "flex-1 overflow-hidden" },
        h('div', { className: "h-full overflow-y-auto" },
          view === "library" && h(LibraryView, { games, onSelect: setSelectedGame, search, setSearch, activePlatform, setActivePlatform, notifications, onMarkAsRead: markAsRead }),
          view === "community" && h(CommunityView, { friends: FRIENDS, onSelectFriend: setSelectedFriend }),
          view === "catalogue" && h(CatalogueView, { onSelect: game => { const e = games.find(g => g.game_id === game.game_id); if (e) setSelectedGame(e); else { setSelectedGame({ ...game, userRating: 0, hasReview: false, reviewText: "", reviewPublic: true, status: "not_started" }); API.syncGames([{ ...game, user_rating: 0, review_text: "", review_public: 1, has_review: 0, status: "not_started", playtime: 0 }]).then(() => loadData()).catch(() => {}); } }, wishlistIds, onToggleWishlist: handleToggleWishlist, ratings }),
          view === "reviews" && h(ReviewsView, { games, onSelect: setSelectedGame }),
          view === "profile" && h(ProfileView, { user, games, wishlistIds, ratings, onToggleWishlist: handleToggleWishlist, onSelect: setSelectedGame, topThreeIds, topThree, onToggleTopThree: handleToggleTopThree, onLogout: handleLogout, onDeleteAccount: handleDeleteAccount })
        )
      ),
      h(BottomNav, { view, setView }),
      selectedGame && h(GameDetailSheet, {
        key: selectedGame.game_id || selectedGame.id,
        game: selectedGame,
        onClose: () => setSelectedGame(null),
        onSaveReview: handleSaveReview,
        wishlistIds,
        onToggleWishlist: handleToggleWishlist,
        topThreeIds,
        onToggleTopThree: handleToggleTopThree,
        userId: user?.id,
        ratings,
      }),
      selectedFriend && h(FriendProfileSheet, { key: selectedFriend.id, friend: selectedFriend, onClose: () => setSelectedFriend(null) }),
      toast && h('div', { className: "toast", style: { background: GRAD } }, toast)
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
