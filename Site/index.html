  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { background: '#0f0f1c', foreground: '#e8e8f0', 'muted-foreground': '#8888aa', secondary: '#1a1a2e', border: '#1e1e32', card: '#151528' }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { scrollbar-width: none; }
    body { margin: 0; background: #030308; font-family: 'DM Sans', sans-serif; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
    .view-enter { animation: fadeSlideIn 0.2s ease-out; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .sheet-overlay { animation: fadeIn 0.2s ease-out; }
    .sheet-panel { animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1); }
    .game-card { transition: transform 0.15s ease, box-shadow 0.15s ease; cursor: pointer; }
    .game-card:hover { transform: scale(1.02); box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
    .game-card:active { transform: scale(0.94); }
    .pill-btn { transition: all 0.2s ease; }
    .pill-btn:hover { opacity: 0.85; }
    .no-underline { text-decoration: none; }
    .review-card { transition: border-color 0.2s ease, transform 0.15s ease; cursor: pointer; }
    .review-card:hover { border-color: #8B5CF6 !important; transform: scale(1.01); }
    .review-card:active { transform: scale(0.98); }
    .sheet-close-btn { transition: background 0.2s ease; }
    .sheet-close-btn:hover { background: rgba(0,0,0,0.7) !important; }
    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 999; padding: 10px 24px; border-radius: 12px; font-size: 13px; font-weight: 600; color: #fff; animation: fadeSlideIn 0.3s ease-out; pointer-events: none; }
    @media (min-width: 768px) {
      .game-card:hover { transform: scale(1.03); }
      .nav-btn { transition: all 0.2s ease; }
      .nav-btn:hover { opacity: 0.8; transform: translateY(-2px); }
      .sheet-panel { max-width: 480px !important; left: 50% !important; right: auto !important; top: 50% !important; bottom: auto !important; transform: translate(-50%, -50%) !important; border-radius: 28px !important; max-height: 90vh !important; box-shadow: 0 25px 60px rgba(0,0,0,0.6); }
      .sheet-overlay { background: rgba(0,0,0,0.7) !important; }
    }
    @media (min-width: 1024px) {
      .app-content { max-width: 1200px !important; margin: 0 auto !important; }
    }

const API = {
  async request(method, url, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin' };
    if (body) opts.body = JSON.stringify(body);
    console.log(`[API] ${method} ${url}`, body || '');
    const res = await fetch(url, opts);
    console.log(`[API] Response ${res.status}`, res.statusText);
    const data = await res.json();
    console.log(`[API] Data`, data);
    if (!res.ok) throw new Error(data.error || 'Erreur serveur');
    return data;
  },
  register: (u, d, p, e) => API.request('POST', '/api/register', { username: u, displayName: d, password: p, email: e }),
  login: (u, p) => API.request('POST', '/api/login', { username: u, password: p }),
  forgotPassword: (email) => API.request('POST', '/api/auth/forgot-password', { email }),
  resetPassword: (token, newPassword) => API.request('POST', '/api/auth/reset-password', { token, newPassword }),
  forgotUsername: (email) => API.request('POST', '/api/auth/forgot-username', { email }),
  logout: () => API.request('POST', '/api/logout'),
  me: () => API.request('GET', '/api/me'),
  getGames: () => API.request('GET', '/api/games'),
  syncGames: (games) => API.request('POST', '/api/games/sync', { games }),
  connectSteam: (steamId) => API.request('POST', '/api/platform/steam/connect', { steamId }),
  resyncSteam: () => API.request('POST', '/api/platform/steam/resync'),
  connectXbox: (gamertag) => API.request('POST', '/api/platform/xbox/connect', { gamertag }),
  xboxDiagnostic: (gamertag) => API.request('GET', '/api/platform/xbox/diagnostic?gamertag=' + encodeURIComponent(gamertag)),
  setStatus: (gameId, status) => API.request('POST', '/api/games/status', { gameId, status }),
  saveReview: (gameId, rating, reviewText, reviewPublic, gameTitle, gameCover) => API.request('POST', '/api/games/review', { gameId, rating, reviewText, reviewPublic, gameTitle, gameCover }),
  getWishlist: () => API.request('GET', '/api/wishlist'),
  toggleWishlist: (gameId) => API.request('POST', '/api/wishlist/toggle', { gameId }),
  getTopThree: () => API.request('GET', '/api/topthree'),
  setTopThree: (gameId, position) => API.request('POST', '/api/topthree', { gameId, position }),
  getGameReviews: (gameId) => API.request('GET', `/api/games/reviews?gameId=${gameId}`),
  getGameRatings: () => API.request('GET', '/api/games/ratings'),
  getReviewsFeed: () => API.request('GET', '/api/reviews/feed'),
  deleteAccount: () => API.request('DELETE', '/api/account'),
  searchUsers: (q) => API.request('GET', `/api/users/search?q=${encodeURIComponent(q)}`),
  sendFriendRequest: (friendId) => API.request('POST', '/api/friends/request', { friendId }),
  acceptFriendRequest: (friendId) => API.request('POST', '/api/friends/accept', { friendId }),
  removeFriend: (friendId) => API.request('POST', '/api/friends/remove', { friendId }),
  getFriends: () => API.request('GET', '/api/friends'),
  getPendingRequests: () => API.request('GET', '/api/friends/requests'),
  getFriendGames: (friendId) => API.request('GET', `/api/friends/${friendId}/games`),
  getUserProfile: (userId) => API.request('GET', `/api/users/${userId}/profile`),
  getFriendStatus: (friendId) => API.request('GET', `/api/friends/status/${friendId}`),
  updateAvatar: (avatarUrl) => API.request('POST', '/api/account/avatar', { avatarUrl }),
  updateEmail: (email) => API.request('POST', '/api/account/email', { email }),
  sendSuggestion: (toUserId, gameId, gameTitle, gameCover, message) => API.request('POST', '/api/suggestions', { toUserId, gameId, gameTitle, gameCover, message }),
  getSuggestions: () => API.request('GET', '/api/suggestions'),
  dismissSuggestion: (id) => API.request('DELETE', `/api/suggestions/${id}`),
  getCatalog: () => API.request('GET', '/api/catalog'),
  deleteGame: (gameId) => API.request('DELETE', `/api/games/${gameId}`),
  disconnectPlatform: (platform) => API.request('DELETE', `/api/games/platform/${platform}`),
  heartbeat: () => API.request('POST', '/api/heartbeat'),
  sendMessage: (receiverId, message) => API.request('POST', '/api/messages/send', { receiverId, message }),
  getMessages: (friendId) => API.request('GET', `/api/messages/${friendId}`),
  getConversations: () => API.request('GET', '/api/messages/conversations'),
  getUnreadMessages: () => API.request('GET', '/api/messages/unread'),
  getGameDetails: (gameId, cover) => API.request('GET', `/api/game-details/${gameId}?cover=${encodeURIComponent(cover || '')}`),
};

const P2 = "#3B82F6";

function isOnline(lastSeen) {
  if (!lastSeen) return false;
  return Date.now() - new Date(lastSeen).getTime() < 300000;
}

const STATUS_CONFIG = {
  playing:    { label: "En cours",    color: "#22c55e" },
  completed:  { label: "Termin\u00e9",   color: P1 },
  backlog:    { label: "\u00c0 jouer",   color: "#f59e0b" },
  dropped:    { label: "Abandonn\u00e9", color: "#ef4444" },
  not_started:{ label: "Pas commenc\u00e9", color: "#444466" },
};

  const svgs = {
    ps5: '<svg viewBox="0 0 24 24" fill="none" stroke="#003791" stroke-width="1.5"><path d="M5.5 5h13A2.5 2.5 0 0 1 21 7.5v9a2.5 2.5 0 0 1-2.5 2.5h-13A2.5 2.5 0 0 1 3 16.5v-9A2.5 2.5 0 0 1 5.5 5z"/><circle cx="8" cy="12" r="1.5" fill="#003791"/><circle cx="16" cy="12" r="1.5" fill="#003791"/><path d="M10 9h4" stroke="#003791"/></svg>',

  };
  const svg = svgs[platform];
  if (!svg) return null;
  return h('span', { dangerouslySetInnerHTML: { __html: svg }, style: { width: size + 'px', height: size + 'px', display: 'inline-block', lineHeight: 0 } });
}

function getStoreUrl(game) {
  const platform = game.platform || 'steam';
  const cfg = MONETIZATION.STORES[platform];
  if (!cfg || !game.storePath) return null;
  return cfg.url + game.storePath + cfg.param;
}

function trackAffiliateClick(gameId, platform) {
  fetch('/api/affiliate/click', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ gameId, platform, ts: Date.now() })
  }).catch(() => {});
}

function PlatformBadge({ platform, platforms, small }) {
  const list = platforms || (platform ? platform.split(',').map(s => s.trim()).filter(Boolean) : []);
  if (list.length === 0) return null;
  const sz = small ? "text-[8px] px-1 py-px gap-0.5" : "text-[10px] px-2 py-0.5 gap-1";
  const icoSz = small ? 7 : 10;
  if (list.length === 1) {
    const cfg = PLATFORM_CONFIG[list[0]];
    if (!cfg) return null;
    return h('span', { className: `inline-flex items-center rounded-md font-bold ${sz}`, style: { background: cfg.color + "cc", color: "#fff", border: `1px solid ${cfg.color}` } }, h(PlatformLogo, { platform: list[0], size: icoSz }), !small && cfg.label);
  }
  return h('div', { className: "flex flex-wrap gap-0.5" }, list.map(p => {
    const cfg = PLATFORM_CONFIG[p];
    if (!cfg) return null;
    return h('span', { key: p, className: `inline-flex items-center rounded-md font-bold ${sz}`, style: { background: cfg.color + "cc", color: "#fff", border: `1px solid ${cfg.color}` } }, h(PlatformLogo, { platform: p, size: icoSz }), !small && cfg.label);
  }));
}

function StarRating({ rating, size = 14, interactive = false, onChange }) {
  return h('div', { className: "flex gap-0.5" }, ...[1,2,3,4,5].map(i =>
    h('button', { key: i, onClick: () => interactive && onChange?.(i), className: interactive ? "cursor-pointer hover:scale-125 transition-transform" : "cursor-default pointer-events-none" },
      h(Star, { size, fill: i <= rating ? "#f59e0b" : "transparent", stroke: i <= rating ? "#f59e0b" : "#3a3a55", strokeWidth: 1.5 })
    )
  ));
}

function GameCard({ game, onClick, wishlistIds, onWishlist, topThreeIds, onCrown, small }) {
  const status = game.status ? STATUS_CONFIG[game.status] : null;
  const inWishlist = wishlistIds?.has(game.game_id || game.id);
  const inTopThree = topThreeIds?.has(game.game_id || game.id);
  const gameId = game.game_id || game.id;
  const storeUrl = getStoreUrl(game);
  return h('div', { onClick, className: "game-card relative rounded-2xl overflow-hidden", style: { aspectRatio: "3/4", background: "#1a1a2e" } },
    h('img', { src: game.cover, alt: game.title, className: "absolute inset-0 w-full h-full object-cover", loading: "lazy" }),
    h('div', { className: "absolute inset-0 bg-gradient-to-t from-black/95 via-black/20 to-transparent" }),
    status && game.status !== "not_started" && h('div', { className: "absolute top-2.5 right-2.5 w-2.5 h-2.5 rounded-full", style: { background: status.color, boxShadow: `0 0 8px ${status.color}80` } }),
    game.hasReview && h('div', { className: "absolute top-2.5 left-2.5 w-5 h-5 rounded-full flex items-center justify-center", style: { background: GRAD } }, h(Edit3, { size: 10, className: "text-white" })),

    onWishlist && h('button', { onClick: e => { e.stopPropagation(); onWishlist(game); }, className: "absolute top-9 left-2.5 w-5 h-5 rounded-full flex items-center justify-center transition-transform hover:scale-125", style: { background: inWishlist ? "rgba(239,68,68,0.9)" : "rgba(0,0,0,0.5)" } }, h(Heart, { size: 11, fill: inWishlist ? "#fff" : "none", stroke: "#fff", strokeWidth: 2 })),

function LibraryView({ games, onSelect, search, setSearch, activePlatform, setActivePlatform, notifications, onMarkAsRead, onSyncComplete, showToast, user, onAddNotification }) {
  const genres = useMemo(() => ["all", ...new Set(games.map(g => g.genre).filter(Boolean))], [games]);
  const [showFilters, setShowFilters] = useState(false);
  const [filterGenre, setFilterGenre] = useState("all");
  const [filterRatingMin, setFilterRatingMin] = useState(0);
  const [filterRatingMax, setFilterRatingMax] = useState(5);
  const [filterStatus, setFilterStatus] = useState("all");
  const [filterYearMin, setFilterYearMin] = useState("");
  const [filterYearMax, setFilterYearMax] = useState("");
  const [filterDeveloper, setFilterDeveloper] = useState("");
  const filtered = useMemo(() => games.filter(g =>
    (activePlatform === "all" || (g.platforms || [g.platform]).filter(Boolean).includes(activePlatform)) &&
    (filterGenre === "all" || g.genre === filterGenre) &&
    (filterStatus === "all" || g.status === filterStatus) &&
    (filterRatingMin === 0 || (g.userRating || 0) >= filterRatingMin) &&
    (filterRatingMax === 5 || (g.userRating || 0) <= filterRatingMax) &&
    (!filterYearMin || (g.year || 0) >= Number(filterYearMin)) &&
    (!filterYearMax || (g.year || 0) <= Number(filterYearMax)) &&
    (!filterDeveloper || (g.developer || '').toLowerCase().includes(filterDeveloper.toLowerCase())) &&
    g.title.toLowerCase().includes(search.toLowerCase())
  ), [games, activePlatform, search, filterGenre, filterRatingMin, filterRatingMax, filterStatus, filterYearMin, filterYearMax, filterDeveloper]);
  const hasActiveFilters = filterGenre !== "all" || filterStatus !== "all" || filterRatingMin > 0 || filterRatingMax < 5 || filterYearMin || filterYearMax || filterDeveloper;
  const clearFilters = () => { setFilterGenre("all"); setFilterStatus("all"); setFilterRatingMin(0); setFilterRatingMax(5); setFilterYearMin(""); setFilterYearMax(""); setFilterDeveloper(""); };
  const totalHours = games.reduce((s, g) => s + g.playtime, 0);
  const platforms = ["all", "ps5", "steam", "epic", "nintendo", "xbox"];
  const [showNotifications, setShowNotifications] = useState(false);
  const [showSync, setShowSync] = useState(false);
  const [syncing, setSyncing] = useState(null);
  const [connected, setConnected] = useState({ ps5: true, steam: !!(user?.steam_id), epic: true, nintendo: false, xbox: !!(user?.xbox_gamertag) });
  const connectedCount = Object.values(connected).filter(Boolean).length;
  const unread = notifications.filter(n => !n.read).length;
  const [bridgeUrl, setBridgeUrl] = useState(() => localStorage.getItem('playnite_bridge_url') || 'http://localhost:3456');
  const [showBridgeConfig, setShowBridgeConfig] = useState(false);
  const [bridgeOnline, setBridgeOnline] = useState(null);

  useEffect(() => {
    fetch(bridgeUrl + '/health', { signal: AbortSignal.timeout(3000) })
      .then(r => setBridgeOnline(r.ok))
      .catch(() => setBridgeOnline(false));
  }, [bridgeUrl]);
  const handleFileImport = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      const importGames = (data.games || []).map(g => ({
        game_id: g.game_id || (g.platform + '-' + (g.gameId || g.id)),
        title: g.title || g.name, platform: g.platform, playtime: g.playtime || 0,
        status: g.status || 'not_started', cover: g.cover || '', genre: g.genre || '', year: g.year || 0,
        user_rating: g.user_rating || 0, review_text: g.review_text || '', review_public: true, has_review: 0,
      }));
      await API.syncGames(importGames);
      onSyncComplete?.();
      showToast(`Importé : ${importGames.length} jeux`);
    } catch (err) { showToast('Erreur fichier : ' + err.message); }
    e.target.value = '';
  };

  const syncFromBridge = async (platformFilter) => {
    try {
      const url = platformFilter ? `${bridgeUrl}/games/${platformFilter}` : `${bridgeUrl}/games`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Pont Playnite inaccessible');
      const data = await res.json();
      const playniteGames = (data.games || []).map(g => ({
        game_id: g.platform + '-' + (g.gameId || g.id),
        title: g.name,
        platform: g.platform,
        playtime: Math.round(g.playtime / 60),
        status: g.playtime > 0 ? 'playing' : 'not_started',
        cover: '',
        genre: '',
        year: 0,
        user_rating: 0,
        review_text: '',
        review_public: true,
        has_review: false,
      }));
      setSyncing(platformFilter || 'all');
      await API.syncGames(playniteGames);
      if (platformFilter) setConnected(c => ({ ...c, [platformFilter]: true }));
      onSyncComplete?.();
      onAddNotification?.(`${playniteGames.length} jeux synchronisés depuis Playnite`, "sync");
      showToast(`Sync terminé : ${playniteGames.length} jeux ajoutés à la bibliothèque et au catalogue`);
    } catch (err) {
      showToast('Erreur : ' + err.message);
    }
    setSyncing(null);
  };

  return h('div', { className: "flex flex-col h-full view-enter" },
    (showNotifications || showSync) && h('div', { onClick: () => { setShowNotifications(false); setShowSync(false); }, style: { position: "fixed", inset: 0, zIndex: 10, background: "rgba(0,0,0,0.5)" } }),
    h('div', { className: "px-4 pt-3 pb-2 flex-shrink-0", style: { position: "relative", overflow: "visible" } },
      h('div', { className: "flex items-center gap-2.5 mb-3" },
        h('img', { src: "logo_hackaton.png", alt: "PlayPad", className: "w-9 h-9 object-contain" }),
        h('div', null,
          h('h1', { className: "text-xl font-black text-foreground leading-none", style: { fontFamily: "'Rajdhani', sans-serif" } }, "Ma Biblioth\u00e8que"),
          h('p', { className: "text-xs text-muted-foreground mt-0.5" }, h('span', { className: "font-bold", style: { color: P1 } }, games.length), " jeux \u00b7 ", h('span', { className: "font-bold", style: { color: P2 } }, `${totalHours}h`), " jou\u00e9es")
        ),
        h('button', { onClick: () => { setShowSync(!showSync); setShowNotifications(false); }, className: "ml-auto p-1.5 rounded-lg hover:opacity-80 transition-opacity", style: { background: showSync ? `${P1}20` : "transparent" } }, h(Zap, { size: 14, style: { color: connectedCount > 0 ? P1 : "#8888aa" } })),
        h('button', { onClick: () => { setShowNotifications(!showNotifications); setShowSync(false); }, className: "relative p-1.5 rounded-lg hover:opacity-80 transition-opacity", style: { background: showNotifications ? `${P1}20` : "transparent" } },
          h(Bell, { size: 14, style: { color: unread > 0 ? P1 : "#8888aa" } }),
          unread > 0 && h('span', { className: "absolute -top-0.5 -right-0.5 w-3.5 h-3.5 rounded-full flex items-center justify-center text-[7px] font-black text-white", style: { background: "#ef4444" } }, unread)
        )
      ),
      h('div', { className: "relative mb-3 flex gap-2" },

function App() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState("library");
  const [games, setGames] = useState([]);
  const [wishlistIds, setWishlistIds] = useState(new Set());
  const [topThreeIds, setTopThreeIds] = useState(new Set());
  const [topThree, setTopThree] = useState([]);
  const [selectedGame, setSelectedGame] = useState(null);
  const [search, setSearch] = useState("");
  const [activePlatform, setActivePlatform] = useState("all");
  const [ratings, setRatings] = useState({});
  const [selectedFriend, setSelectedFriend] = useState(null);
  const [notifications, setNotifications] = useState(NOTIFICATIONS);
  const [toast, setToast] = useState(null);
  const [currentTheme, setCurrentTheme] = useState(() => localStorage.getItem('playpad_theme') || 'default');

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

  useEffect(() => {
    console.log('[App] Checking session...');
    API.me().then(data => {
      console.log('[App] Session found:', data.user);
      setUser(data.user);
      return Promise.all([API.getGames(), API.getWishlist(), API.getTopThree(), API.getGameRatings()]);
    }).then(([gData, wData, tData, rData]) => {
      console.log('[App] Data loaded:', gData.games.length, 'games,', wData.wishlist.length, 'wishlist');
      setGames(gData.games.map(n));
      setWishlistIds(new Set(wData.wishlist));
      const t = (tData.topThree || []).map(n);
      setTopThree(t);
      setTopThreeIds(new Set(t.map(g => g.game_id)));
      setRatings(rData.ratings || {});
    }).catch((err) => {
      console.log('[App] No session (expected if not logged in):', err?.message);
    }).finally(() => {
      const params = new URLSearchParams(window.location.search);
      if (params.get('steam') === 'ok') { showToast(`${params.get('count') || 0} jeux Steam importés`); }
      else if (params.get('steam') === 'error') { showToast('Erreur Steam: ' + (params.get('msg') || '?')); }
      if (params.has('steam')) { window.history.replaceState({}, '', window.location.pathname); }
      setLoading(false);
    });
  }, []);
  const [lastHeartbeat, setLastHeartbeat] = useState(0);
  useEffect(() => {
    API.heartbeat().catch(() => {});
    const interval = setInterval(() => { API.heartbeat().catch(() => {}); }, 120000);
    return () => clearInterval(interval);
  }, []);
  // Poll unread messages as notifications
  const notifiedMsgIds = useRef(new Set());
  useEffect(() => {
    if (!user) return;
    const poll = () => {
      API.getUnreadMessages().then(d => {
        for (const m of (d.unread || [])) {
          if (!notifiedMsgIds.current.has(m.id)) {
            notifiedMsgIds.current.add(m.id);
            setNotifications(prev => [{ id: 'msg-' + m.id, text: m.message, read: false, friendId: m.sender_id, type: 'message', timestamp: Date.now(), senderName: m.sender?.display_name || 'Quelqu\'un' }, ...prev]);
          }
        }
      }).catch(() => {});
    };
    poll();
    const interval = setInterval(poll, 10000);
    return () => clearInterval(interval);
  }, [user]);

  const loadData = async () => {
    const [gData, wData, tData, rData] = await Promise.all([API.getGames(), API.getWishlist(), API.getTopThree(), API.getGameRatings()]);
    setGames(gData.games.map(n));
    setWishlistIds(new Set(wData.wishlist));
    const t = (tData.topThree || []).map(n);
    setTopThree(t);
    setTopThreeIds(new Set(t.map(g => g.game_id)));
    setRatings(rData.ratings || {});
  };

  const handleAddToLibrary = async (game) => {
    const existing = games.find(g => g.game_id === game.game_id);
    if (existing) { setSelectedGame(existing); return; }
    const newGame = { ...game, user_rating: 0, review_text: "", review_public: 1, has_review: 0, status: "not_started", playtime: 0 };
    try {
      await API.syncGames([newGame]);
      await loadData();
      showToast(`"${game.title}" ajout\u00e9 \u00e0 ta biblioth\u00e8que`);
    } catch (e) {
      console.error('[Library] Add game error:', e.message);
      showToast("Erreur lors de l'ajout: " + e.message);
    }
  };

  const handleToggleWishlist = async (game) => {
    const gameId = game.game_id || game.id;
    try {
      const data = await API.toggleWishlist(gameId);
      setWishlistIds(prev => {
        const next = new Set(prev);
        if (data.added) next.add(gameId); else next.delete(gameId);
        return next;
      });
      showToast(data.added ? `Ajout\u00e9 aux souhaits` : `Retir\u00e9 des souhaits`);
    } catch (e) {}
  };

  const handleToggleTopThree = async (game) => {
    const id = game.game_id || game.id;
    const already = topThreeIds?.has(id);
    if (already) {
      setTopThreeIds(prev => { const n = new Set(prev); n.delete(id); return n; });
      setTopThree(prev => prev.filter(g => (g.game_id || g.id) !== id));
    } else if ((topThreeIds?.size || 0) < 3) {
      setTopThreeIds(prev => { const n = new Set(prev); n.add(id); return n; });
    }
  };

  const handleDeleteGame = async (gameId) => {
    if (!confirm("Supprimer ce jeu de votre biblioth\u00e8que ?")) return;
    await API.deleteGame(gameId);
    await loadData();
    setSelectedGame(null);
    showToast("Jeu retir\u00e9 de la biblioth\u00e8que");
  };

  const handleSaveReview = async (gameId, rating, reviewText, reviewPublic, gameTitle, gameCover) => {
    const [gData] = await Promise.all([API.getGames()]);
    let next = gData.games.map(n);
    const found = next.find(g => g.game_id === gameId) || next.find(g => g.title === gameTitle);
    if (!found) {
      await API.syncGames([{ game_id: gameId, title: gameTitle, cover: gameCover || '', user_rating: 0, review_text: "", review_public: 1, has_review: 0, status: "not_started", playtime: 0 }]);
    }
    await API.saveReview(gameId, rating, reviewText, reviewPublic, gameTitle, gameCover);
    const [g2] = await Promise.all([API.getGames()]);
    next = g2.games.map(n);
    setGames(next);
    const updated = next.find(g => g.game_id === gameId) || next.find(g => g.title === gameTitle);
    if (updated) setSelectedGame(updated);
    showToast("Critique sauvegard\u00e9e !");
  };

  const handleLoginSuccess = (userData) => {
    setUser(userData);
    API.getGames().then(d => setGames((d.games || []).map(n))).catch(() => {});
    API.getWishlist().then(d => setWishlistIds(new Set(d.wishlist))).catch(() => {});
    API.getTopThree().then(d => {
      const t = (d.topThree || []).map(n);
      setTopThree(t);
      setTopThreeIds(new Set(t.map(g => g.game_id)));
    }).catch(() => {});
    API.getGameRatings().then(d => setRatings(d.ratings || {})).catch(() => {});
  };

  const handleLogout = async () => {
    await API.logout();
    setUser(null);
    setGames([]);
    setWishlistIds(new Set());
    setTopThree([]);
    setTopThreeIds(new Set());
    setView("library");
  };

  const markAsRead = (id, friendId) => {
    setNotifications(prev => prev.map(n => n.id === id ? { ...n, read: true } : n));
    if (friendId) {
      const friend = FRIENDS.find(f => f.id === friendId);
      if (friend) { setSelectedFriend(friend); setView("community"); }
    }
  };

  const handleDeleteAccount = async () => {
    if (!confirm("Supprimer d\u00e9finitivement ton compte et toutes tes donn\u00e9es ?")) return;
    await API.deleteAccount();
    handleLogout();
  };

  const handleUpdateAvatar = async (avatarUrl) => {
    await API.updateAvatar(avatarUrl);
    setUser(prev => ({ ...prev, avatar_url: avatarUrl }));
  };

  const handleUpdateEmail = async (email) => {
    const data = await API.updateEmail(email);
    setUser(prev => ({ ...prev, email: data.email }));
    showToast('Email mis à jour');
  };

  if (loading) {
    return h('div', { className: "min-h-screen flex items-center justify-center", style: { background: "#030308" } },
      h('div', { className: "flex flex-col items-center gap-3" },
        h(Loader, { size: 28, className: "animate-spin", style: { color: P1 } }),
        h('p', { className: "text-xs text-muted-foreground" }, "Chargement\u2026")
      )
    );
  }

  if (!user) return h(AuthPage, { onLoginSuccess: handleLoginSuccess });

  return h('div', { className: "min-h-screen", style: { background: "#030308" } },
    h('div', { className: "fixed inset-0 pointer-events-none overflow-hidden" },
      h('div', { className: "absolute top-1/3 left-1/2 -translate-x-1/2 w-96 h-96 rounded-full blur-3xl", style: { background: `${P1}07` } }),
      h('div', { className: "absolute bottom-1/4 right-1/3 w-64 h-64 rounded-full blur-3xl", style: { background: `${P2}07` } })
    ),
    h('div', { className: "app-content relative flex flex-col h-screen bg-background mx-auto" },
      h('div', { className: "flex-1 overflow-hidden" },
        h('div', { className: "h-full overflow-y-auto" },
          view === "library" && h(LibraryView, { games, onSelect: setSelectedGame, search, setSearch, activePlatform, setActivePlatform, notifications, onMarkAsRead: markAsRead, showToast, onSyncComplete: loadData, user, onAddNotification: (msg, type) => { setNotifications(prev => [ { id: "n" + Date.now(), text: msg, read: false, type: type || 'sync', timestamp: Date.now() }, ...prev ]); } }),
          view === "community" && h(CommunityView, { onSelectFriend: setSelectedFriend, onSelectGame: setSelectedGame, onAddNotification: (msg, type) => { setNotifications(prev => [ { id: "n" + Date.now(), text: msg, read: false, type: type || 'friend', timestamp: Date.now() }, ...prev ]); } }),
          view === "catalogue" && h(CatalogueView, { onSelect: game => { const e = games.find(g => g.game_id === game.game_id) || games.find(g => g.title === game.title); setSelectedGame(e || { ...game, userRating: 0, hasReview: false, reviewText: "", reviewPublic: true, status: "not_started" }); }, wishlistIds, onToggleWishlist: handleToggleWishlist, ratings }),
          view === "reviews" && h(ReviewsView, { games, onSelect: setSelectedGame }),
          view === "profile" && h(ProfileView, { user, games, wishlistIds, ratings, onToggleWishlist: handleToggleWishlist, onSelect: setSelectedGame, topThreeIds, topThree, onToggleTopThree: handleToggleTopThree, onLogout: handleLogout, onDeleteAccount: handleDeleteAccount, onUpdateAvatar: handleUpdateAvatar, onUpdateEmail: handleUpdateEmail, onSyncComplete: () => { loadGames(); loadCatalog(); }, showToast, currentTheme, onSelectTheme: (id) => { setCurrentTheme(id); localStorage.setItem('playpad_theme', id); } })
        )
      ),
      h(BottomNav, { view, setView }),
      selectedGame && h(GameDetailSheet, {
        key: selectedGame.game_id || selectedGame.id,
        game: selectedGame,
        onClose: () => setSelectedGame(null),
        onSaveReview: handleSaveReview,
        onDeleteGame: handleDeleteGame,
        wishlistIds,
        onToggleWishlist: handleToggleWishlist,
        topThreeIds,
        onToggleTopThree: handleToggleTopThree,
        userId: user?.id,
        ratings,
      }),
      selectedFriend && h(FriendProfileSheet, { key: selectedFriend.id, friend: selectedFriend, onClose: () => setSelectedFriend(null), isOnline, onAddNotification: (msg, type) => { setNotifications(prev => [ { id: "n" + Date.now(), text: msg, read: false, friendId: selectedFriend.id, type: type || 'friend', timestamp: Date.now() }, ...prev ]); } }),
      toast && h('div', { className: "toast", style: { background: GRAD } }, toast)
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
